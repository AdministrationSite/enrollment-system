function togglePassword(id){

let p=document.getElementById(id);

p.type=p.type==="password"?"text":"password";

}

function validAdminEmail(email){

let pattern=/^[a-zA-Z0-9._%+-]+96user@gmail\.com$/;

return pattern.test(email);

}

function validStudentEmail(email){

let pattern=/^[a-zA-Z0-9._%+-]+\.syrmin6@gmail\.com$/;

return pattern.test(email);

}

/* SESSION CHECK */

function updateTime(){
    const now = new Date();

    const hours = now.getHours() % 12 || 12;
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const milliseconds = String(now.getMilliseconds()).padStart(3, '0');

    const weekday = now.toLocaleDateString('en-US', { weekday: 'long' });
    const month = now.toLocaleDateString('en-US', { month: 'long' });
    const day = now.getDate();
    const year = now.getFullYear();

    const timeString = `${hours}:${minutes}:${seconds}:${milliseconds} | ${weekday}, ${month} ${day}, ${year}`;

    document.getElementById("liveTime").innerText = timeString;

    // Show logged-in admin email
    const email = localStorage.getItem("adminEmail");
    if(email){
        document.getElementById("adminEmailDisplay").innerText = `Hello! ${email}`;
    }
}

// Update every 100ms
setInterval(updateTime, 100);

window.onload=function(){

sessionStorage.removeItem("adminLogin");

let savedEmail=localStorage.getItem("adminEmail");
let savedPass=localStorage.getItem("adminPass");

if(savedEmail){
document.getElementById("loginEmail").value=savedEmail;
}

if(savedPass){
document.getElementById("loginPassword").value=savedPass;
}

if(sessionStorage.getItem("adminLogin")=="true"){

document.getElementById("loginPage").style.display="none";
document.getElementById("adminPanel").classList.remove("hidden");

loadDropdowns();
loadTable();

startLogoutTimer();

}

}

/* SIGNUP */

function signup(){

let email=document.getElementById("signupEmail").value;
let pass=document.getElementById("signupPassword").value;

if(!validAdminEmail(email)){
alert("Admin email must end with 96user@gmail.com");
return;
}

let users=JSON.parse(localStorage.getItem("adminUsers"))||[];

users.push({email,pass});

localStorage.setItem("adminUsers",JSON.stringify(users));

alert("Admin account created");

}


/* LOGIN */

function login(){

let email=document.getElementById("loginEmail").value;
let pass=document.getElementById("loginPassword").value;

let users=JSON.parse(localStorage.getItem("adminUsers"))||[];

let user=users.find(u=>u.email===email && u.pass===pass);

if(!user){

alert("Invalid login");
return;

}

sessionStorage.setItem("adminLogin","true");
localStorage.setItem("adminEmail",email);
localStorage.setItem("adminPass",pass);

document.getElementById("loginPage").style.display="none";
document.getElementById("adminPanel").classList.remove("hidden");

loadDropdowns();
loadTable();

}


/* ADD SUBJECT */

function addSubject(){

let code=document.getElementById("code").value;
let name=document.getElementById("name").value;
let room=document.getElementById("room").value;
let time=document.getElementById("time").value;
let week=document.getElementById("week").value;
let year=document.getElementById("year").value;
let email=document.getElementById("email").value;

if(!validStudentEmail(email)){
alert("Student email must end with .syrmin6@gmail.com");
return;
}

let subjects=JSON.parse(localStorage.getItem("subjects"))||[];

subjects.push({code,name,room,time,week,year,email});

localStorage.setItem("subjects",JSON.stringify(subjects));

loadDropdowns();

alert("Subject Added");

}

function loadDropdowns(){

let storedSubjects = JSON.parse(localStorage.getItem("subjects")) || [];

/* MERGE FIXED + ADDED SUBJECTS */
let subjects = [...fixedSubjects, ...storedSubjects];

/* REMOVE DUPLICATES (optional safety) */
let unique = [];
let seen = new Set();

subjects.forEach(s=>{

/* REMOVE EMPTY ENTRIES */
if(
s.code.trim() === "" &&
s.name.trim() === "" &&
s.room.trim() === "" &&
s.time.trim() === "" &&
s.week.trim() === "" &&
s.year.trim() === "" &&
s.email.trim() === ""
){
return; // skip blank rows
}

let key = s.code + s.name + s.email;

if(!seen.has(key)){
seen.add(key);
unique.push(s);
}

});

/* SORT ONLY SELECTED FIELDS */
let sortedCode = [...unique].sort((a,b)=>a.code.localeCompare(b.code));
let sortedName = [...unique].sort((a,b)=>a.name.localeCompare(b.name));
let sortedYear = [...unique].sort((a,b)=>a.year.localeCompare(b.year));
let sortedEmail = [...unique].sort((a,b)=>a.email.localeCompare(b.email));

/* GET ELEMENTS */
let scode=document.getElementById("scode");
let sname=document.getElementById("sname");
let sroom=document.getElementById("sroom");
let stime=document.getElementById("stime");
let semail=document.getElementById("semail");
let sweek=document.getElementById("sweek");
let syear=document.getElementById("syear");

/* CLEAR */
scode.innerHTML="";
sname.innerHTML="";
sroom.innerHTML="";
stime.innerHTML="";
semail.innerHTML="";
sweek.innerHTML="";
syear.innerHTML="";

/* APPLY SORTED DROPDOWNS */
/* LIMIT FUNCTION */
function limit(arr, max){
return arr.slice(0, max);
}

/* APPLY SORTED DROPDOWNS WITH LIMITS */

limit(sortedCode,118).forEach(s=>{
if(s.code) scode.innerHTML += `<option>${s.code}</option>`;
});

limit(sortedName,118).forEach(s=>{
if(s.name) sname.innerHTML += `<option>${s.name}</option>`;
});

limit(sortedYear,10).forEach(s=>{
if(s.year) syear.innerHTML += `<option>${s.year}</option>`;
});

limit(sortedEmail,100).forEach(s=>{
if(s.email) semail.innerHTML += `<option>${s.year}</option>`;
});

/* NON-SORTED (ORIGINAL ORDER) */
/* NON-SORTED (NO DUPLICATES, NO REPEAT) */

/* GET UNIQUE VALUES ONCE */
let rooms = [...new Set(unique.map(s => s.room).filter(v=>v))];
let times = [...new Set(unique.map(s => s.time).filter(v=>v))];
let weeks = [...new Set(unique.map(s => s.week).filter(v=>v))];
let years = [...new Set(unique.map(s=>s.year).filter(v=>v))];
let emails = [...new Set(unique.map(s=>s.email).filter(v=>v))];

years.forEach(y=> syear.innerHTML += `<option>${y}</option>`);
emails.forEach(e=> semail.innerHTML += `<option>${e}</option>`);

/* APPLY LIMITS */
rooms.slice(0,6).forEach(r=>{
sroom.innerHTML += `<option>${r}</option>`;
});

times.slice(0,28).forEach(t=>{
stime.innerHTML += `<option>${t}</option>`;
});

weeks.slice(0,7).forEach(w=>{
sweek.innerHTML += `<option>${w}</option>`;
});

}


/* DELETE SUBJECT FROM DROPDOWN */

function deleteSubject(){

let selectedCode=document.getElementById("scode").value;

let subjects=JSON.parse(localStorage.getItem("subjects"))||[];

let index=subjects.findIndex(s=>s.code===selectedCode);

if(index>-1){
subjects.splice(index,1);
}

localStorage.setItem("subjects",JSON.stringify(subjects));

loadDropdowns();

alert("Subject deleted");

}


/* ENROLL */

function enroll(){

let code=document.getElementById("scode").value;
let name=document.getElementById("sname").value;
let room=document.getElementById("sroom").value;
let time=document.getElementById("stime").value;
let week=document.getElementById("sweek").value;
let year=document.getElementById("syear").value;
let email=document.getElementById("semail").value;

let enrollments=JSON.parse(localStorage.getItem("enrollments"))||[];

/* GET DATE + TIME */
let now=new Date();

let date = now.toLocaleDateString("en-US",{
month:"long",
day:"numeric",
year:"numeric"
});

let timeFormat = now.toLocaleTimeString("en-US",{
hour:"numeric",
minute:"2-digit",
second:"2-digit",
hour12:true
});

let timestamp = date + " | " + timeFormat;

enrollments.push({
code,name,room,time,week,year,email,
timestamp
});

localStorage.setItem("enrollments",JSON.stringify(enrollments));

loadTable();
}


/* TABLE */

function loadTable(){

let enrollments=JSON.parse(localStorage.getItem("enrollments"))||[];

let table=document.getElementById("table");

table.innerHTML="";

enrollments.forEach((e,index)=>{

table.innerHTML+=`

<tr>
<td>${e.code}</td>
<td>${e.name}</td>
<td>${e.room}</td>
<td>${e.time}</td>
<td>${e.week}</td>
<td>${e.year}</td>
<td>${e.email}</td>
<td>${e.timestamp}</td>

<td>
<button onclick="sendEmail(${index})">Send</button>
<button class="delete" onclick="remove(${index})">Delete</button>
</td>
</tr>

`;

});

}


/* REMOVE ENROLLMENT */

function sendEmail(index){

let enrollments=JSON.parse(localStorage.getItem("enrollments"))||[];

let e=enrollments[index];

let subject="Enrollment Details";

let body=
"Subject Code: "+e.code+
"%0D%0ASubject Name: "+e.name+
"%0D%0ARoom: "+e.room+
"%0D%0ATime: "+e.time+
"%0D%0AWeek: "+e.week+
"%0D%0AYear: "+e.year+
"%0D%0AStudent Email: "+e.email;

window.open(
"https://mail.google.com/mail/?view=cm&fs=1&to="+e.email+
"&su="+subject+
"&body="+body,
"_blank"
);

}

function remove(index){

let enrollments = JSON.parse(localStorage.getItem("enrollments")) || [];

enrollments.splice(index,1);

localStorage.setItem("enrollments",JSON.stringify(enrollments));

loadTable();

}
